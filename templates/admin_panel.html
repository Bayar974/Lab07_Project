<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #0a0e1a; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0; left: 0;
      width: 240px; height: 100vh;
      background: #111827;
      border-right: 1px solid #1f2937;
      padding: 24px 0;
      z-index: 100;
    }
    .sidebar-logo {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      padding: 0 24px 24px;
      border-bottom: 1px solid #1f2937;
      margin-bottom: 16px;
    }
    .sidebar-logo span { color: #3b82f6; }
    .sidebar-menu { list-style: none; padding: 0; margin: 0; }
    .sidebar-menu li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      color: #6b7280;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }
    .sidebar-menu li a:hover,
    .sidebar-menu li a.active {
      background: #1f2937;
      color: #fff;
      border-right: 2px solid #3b82f6;
    }
    .sidebar-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px 24px;
      border-top: 1px solid #1f2937;
    }
    .btn-logout {
      width: 100%;
      background: transparent;
      border: 1px solid #374151;
      color: #6b7280;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #ef4444; color: #ef4444; }

    /* Main */
    .main { margin-left: 240px; padding: 32px; }
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .page-sub { color: #6b7280; font-size: 14px; margin-bottom: 28px; }

    /* Stats */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 20px;
    }
    .stat-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #fff; }
    .stat-value.blue { color: #3b82f6; }
    .stat-value.green { color: #10b981; }
    .stat-value.amber { color: #f59e0b; }

    /* Table card */
    .table-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid #1f2937;
    }
    .table-title { font-size: 16px; font-weight: 600; color: #fff; }
    .btn-add {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-add:hover { background: #2563eb; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #0f172a;
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      text-align: left;
    }
    tbody td {
      padding: 14px 24px;
      font-size: 14px;
      color: #d1d5db;
      border-bottom: 1px solid #1f2937;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #1f2937; }

    .badge-genre {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-scifi { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .badge-action { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-drama { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-thriller { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-anime { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-default { background: rgba(107,114,128,0.15); color: #9ca3af; }

    .btn-edit {
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.3);
      color: #60a5fa;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 6px;
    }
    .btn-edit:hover { background: rgba(59,130,246,0.2); }
    .btn-delete {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.2); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
    }
    .modal-title { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 24px; }
    .form-label { color: #9ca3af; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .form-control, .form-select {
      background: #1f2937;
      border: 1px solid #374151;
      color: #fff;
      border-radius: 8px;
      font-size: 14px;
    }
    .form-control:focus, .form-select:focus {
      background: #1f2937;
      border-color: #3b82f6;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .form-select option { background: #1f2937; }
    .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel {
      background: transparent;
      border: 1px solid #374151;
      color: #9ca3af;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-save {
      background: #3b82f6;
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save:hover { background: #2563eb; }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px 20px;
      font-size: 14px;
      color: #fff;
      display: none;
      z-index: 300;
    }
    .toast.show { display: block; }
    .toast.success { border-color: #10b981; color: #34d399; }
    .toast.error { border-color: #ef4444; color: #f87171; }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">STUDIO<span>|</span>POW</div>
    <ul class="sidebar-menu">
      <li><a href="#" class="active">🎬 Кино жагсаалт</a></li>
      <li><a href="/">🌐 Нүүр хуудас</a></li>
    </ul>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="logout()">🚪 Гарах</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="page-title">Кино удирдлага</div>
    <div class="page-sub">Бүх киноны мэдээллийг энд удирдана</div>

    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Нийт кино</div>
        <div class="stat-value blue" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Sci-Fi</div>
        <div class="stat-value" id="stat-scifi">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Action</div>
        <div class="stat-value green" id="stat-action">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Бусад</div>
        <div class="stat-value amber" id="stat-other">0</div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Кинонууд</div>
        <button class="btn-add" onclick="openModal()">+ Кино нэмэх</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Гарчиг</th>
            <th>Жанр</th>
            <th>Он</th>
            <th>Тайлбар</th>
            <th>Үйлдэл</th>
          </tr>
        </thead>
        <tbody id="movie-table"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-title" id="modal-title">Кино нэмэх</div>
      <input type="hidden" id="movie-id">
      <div class="mb-3">
        <label class="form-label">Гарчиг</label>
        <input type="text" class="form-control" id="movie-title" placeholder="Киноны нэр">
      </div>
      <div class="row mb-3">
        <div class="col">
          <label class="form-label">Жанр</label>
          <select class="form-select" id="movie-genre">
            <option>Action</option>
            <option>Drama</option>
            <option>Sci-Fi</option>
            <option>Thriller</option>
            <option>Anime</option>
            <option>Comedy</option>
            <option>Horror</option>
          </select>
        </div>
        <div class="col">
          <label class="form-label">Гарсан он</label>
          <input type="number" class="form-control" id="movie-year" placeholder="2024" min="1888" max="2100">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Тайлбар</label>
        <textarea class="form-control" id="movie-desc" rows="3" placeholder="Киноны тухай..."></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Зургийн зам</label>
        <input type="text" class="form-control" id="movie-img" placeholder="/static/img/poster.jpg">
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal()">Болих</button>
        <button class="btn-save" onclick="saveMovie()">Хадгалах</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    let movies = [];
    let editingId = null;

    // Жанрын badge
    function genreBadge(genre) {
      const map = {
        'Sci-Fi': 'scifi', 'Action': 'action',
        'Drama': 'drama', 'Thriller': 'thriller', 'Anime': 'anime'
      };
      const cls = map[genre] || 'default';
      return `<span class="badge-genre badge-${cls}">${genre}</span>`;
    }

    // Кинонуудыг татах
    async function loadMovies() {
      try {
        const res = await fetch('/api/movies');
        const data = await res.json();
        movies = data.data || [];
        renderTable();
        renderStats();
      } catch (err) {
        showToast('Өгөгдөл татахад алдаа гарлаа', 'error');
      }
    }

    // Хүснэгт харуулах
    function renderTable() {
      const tbody = document.getElementById('movie-table');
      if (movies.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#6b7280;padding:40px">Кино байхгүй байна</td></tr>`;
        return;
      }
      tbody.innerHTML = movies.map(m => `
        <tr>
          <td style="color:#6b7280">#${m.id}</td>
          <td style="font-weight:600;color:#fff">${m.title}</td>
          <td>${genreBadge(m.genre)}</td>
          <td>${m.release_year}</td>
          <td style="color:#6b7280;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.description || '-'}</td>
          <td>
            <button class="btn-edit" onclick="editMovie(${m.id})">✏️ Засах</button>
            <button class="btn-delete" onclick="deleteMovie(${m.id})">🗑️ Устгах</button>
          </td>
        </tr>
      `).join('');
    }

    // Статистик
    function renderStats() {
      document.getElementById('stat-total').textContent = movies.length;
      document.getElementById('stat-scifi').textContent = movies.filter(m => m.genre === 'Sci-Fi').length;
      document.getElementById('stat-action').textContent = movies.filter(m => m.genre === 'Action').length;
      document.getElementById('stat-other').textContent = movies.filter(m => !['Sci-Fi','Action'].includes(m.genre)).length;
    }

    // Modal нээх
    function openModal(movie = null) {
      editingId = movie ? movie.id : null;
      document.getElementById('modal-title').textContent = movie ? 'Кино засах' : 'Кино нэмэх';
      document.getElementById('movie-title').value = movie?.title || '';
      document.getElementById('movie-genre').value = movie?.genre || 'Action';
      document.getElementById('movie-year').value = movie?.release_year || '';
      document.getElementById('movie-desc').value = movie?.description || '';
      document.getElementById('movie-img').value = movie?.image_url || '';
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      editingId = null;
    }

    // Засах
    function editMovie(id) {
      const movie = movies.find(m => m.id === id);
      if (movie) openModal(movie);
    }

    // Хадгалах (Create / Update)
    async function saveMovie() {
      const body = {
        title: document.getElementById('movie-title').value,
        genre: document.getElementById('movie-genre').value,
        release_year: parseInt(document.getElementById('movie-year').value),
        description: document.getElementById('movie-desc').value,
        image_url: document.getElementById('movie-img').value,
      };

      if (!body.title || !body.release_year) {
        showToast('Гарчиг болон он заавал бөглөнө!', 'error');
        return;
      }

      try {
        let res;
        if (editingId) {
          res = await fetch(`/api/movies/${editingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        } else {
          res = await fetch('/api/movies', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
        }

        if (res.ok) {
          showToast(editingId ? 'Амжилттай шинэчлэгдлээ!' : 'Амжилттай нэмэгдлээ!', 'success');
          closeModal();
          loadMovies();
        } else {
          showToast('Алдаа гарлаа!', 'error');
        }
      } catch (err) {
        showToast('Серверт холбогдож чадсангүй', 'error');
      }
    }

    // Устгах
    async function deleteMovie(id) {
      if (!confirm('Энэ киног устгах уу?')) return;
      try {
        const res = await fetch(`/api/movies/${id}`, { method: 'DELETE' });
        if (res.ok) {
          showToast('Амжилттай устгагдлаа!', 'success');
          loadMovies();
        }
      } catch (err) {
        showToast('Устгахад алдаа гарлаа', 'error');
      }
    }

    // Гарах
    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = '/admin/login';
    }

    // Toast
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast show ${type}`;
      setTimeout(() => t.className = 'toast', 3000);
    }

    // Modal гадна дарахад хаах
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    loadMovies();
  </script>
</body>
</html>
