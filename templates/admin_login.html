<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0a0e1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    .login-logo {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .login-logo span { color: #3b82f6; }
    .login-subtitle {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 36px;
    }
    .form-label {
      color: #9ca3af;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-control {
      background: #1f2937;
      border: 1px solid #374151;
      color: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
    }
    .form-control:focus {
      background: #1f2937;
      border-color: #3b82f6;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    .form-control::placeholder { color: #4b5563; }
    .btn-login {
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #fff;
      width: 100%;
      transition: all 0.2s;
    }
    .btn-login:hover {
      background: #2563eb;
      transform: translateY(-1px);
      color: #fff;
    }
    .alert-error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      display: none;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">STUDIO<span>|</span>POW</div>
    <div class="login-subtitle">Админ хэсэгт нэвтрэх</div>

    <div class="alert-error" id="error-msg">
      ⚠️ Нэвтрэх нэр эсвэл нууц үг буруу байна!
    </div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">Нэвтрэх нэр</label>
        <input type="text" class="form-control" id="username" placeholder="admin" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Нууц үг</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-login">Нэвтрэх</button>
    </form>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = '/admin/panel';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
